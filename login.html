<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Sign In | SRMS Control</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Hanken+Grotesk:wght@600;700;800&amp;family=JetBrains+Mono:wght@500&amp;display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
  
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
            "tertiary-fixed": "#acedff",
            "inverse-primary": "#bec6e0",
            "inverse-surface": "#303032",
            "surface": "#fcf8fa",
            "surface-container": "#f0edef",
            "secondary-fixed-dim": "#b4c5ff",
            "on-tertiary-container": "#0090a9",
            "secondary": "#0051d5",
            "outline": "#76777d",
            "primary-container": "#131b2e",
            "on-secondary-container": "#fefcff",
            "on-tertiary-fixed": "#001f26",
            "surface-dim": "#dcd9db",
            "surface-tint": "#565e74",
            "tertiary-container": "#001f26",
            "tertiary-fixed-dim": "#4cd7f6",
            "surface-container-highest": "#e4e2e4",
            "surface-container-lowest": "#ffffff",
            "on-secondary": "#ffffff",
            "primary-fixed": "#dae2fd",
            "tertiary": "#000000",
            "error": "#ba1a1a",
            "inverse-on-surface": "#f3f0f2",
            "outline-variant": "#c6c6cd",
            "on-surface-variant": "#45464d",
            "on-error": "#ffffff",
            "background": "#fcf8fa",
            "on-primary-fixed-variant": "#3f465c",
            "on-background": "#1b1b1d",
            "on-primary-fixed": "#131b2e",
            "on-secondary-fixed-variant": "#003ea8",
            "secondary-container": "#316bf3",
            "secondary-fixed": "#dbe1ff",
            "on-primary": "#ffffff",
            "primary": "#000000",
            "on-surface": "#1b1b1d",
            "on-tertiary-fixed-variant": "#004e5c",
            "on-error-container": "#93000a",
            "primary-fixed-dim": "#bec6e0",
            "surface-variant": "#e4e2e4",
            "surface-bright": "#fcf8fa",
            "on-primary-container": "#7c839b",
            "on-secondary-fixed": "#00174b",
            "surface-container-high": "#eae7e9",
            "surface-container-low": "#f6f3f5",
            "on-tertiary": "#ffffff",
            "error-container": "#ffdad6"
          },
          "borderRadius": {
            "DEFAULT": "0.25rem",
            "lg": "0.5rem",
            "xl": "0.75rem",
            "full": "9999px"
          },
          "spacing": {
            "gutter": "1.5rem",
            "container-max-width": "1280px",
            "card-padding": "1.25rem",
            "margin-mobile": "1rem",
            "margin-desktop": "2rem",
            "stack-gap": "1rem"
          },
          "fontFamily": {
            "body-md": ["Inter"],
            "headline-lg": ["Hanken Grotesk"],
            "display": ["Hanken Grotesk"],
            "badge": ["Inter"],
            "label-md": ["JetBrains Mono"],
            "body-lg": ["Inter"],
            "headline-md": ["Hanken Grotesk"]
          },
          "fontSize": {
            "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
            "headline-lg": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
            "display": ["32px", {"lineHeight": "40px", "fontWeight": "700"}],
            "badge": ["11px", {"lineHeight": "12px", "letterSpacing": "0.05em", "fontWeight": "700"}],
            "label-md": ["12px", {"lineHeight": "16px", "letterSpacing": "0.02em", "fontWeight": "500"}],
            "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
            "headline-md": ["20px", {"lineHeight": "28px", "fontWeight": "600"}]
          }
        },
      },
    }
  </script>
  
  <style>
    .glass-card {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(226, 232, 240, 0.8);
    }
  </style>

  <!-- Auth guard to redirect if already logged in -->
  <script type="module" src="./auth-guard.js"></script>
</head>
<body class="bg-surface font-body-md text-on-surface min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-md p-8 rounded-2xl glass-card shadow-2xl relative overflow-hidden">
    <!-- Header -->
    <div class="mb-8 text-center">
      <div class="inline-flex items-center justify-center w-12 h-12 rounded-xl bg-secondary text-on-secondary mb-4 shadow-md">
        <span class="material-symbols-outlined text-[28px]" style="font-variation-settings: 'FILL' 1;">kitchen</span>
      </div>
      <h2 class="font-display text-[28px] font-bold text-primary">Welcome Back</h2>
      <p class="font-body-md text-on-surface-variant mt-2">Sign in to monitor your smart refrigerator</p>
    </div>

    <!-- Error Banner -->
    <div id="error-banner" class="hidden mb-6 p-4 bg-error-container/20 border-l-4 border-error text-error text-body-md rounded-lg flex items-center gap-3">
      <span class="material-symbols-outlined text-[20px]">error</span>
      <span id="error-message">Invalid credentials</span>
    </div>

    <!-- Form -->
    <form id="login-form" class="space-y-6">
      <div class="flex flex-col gap-1.5">
        <label for="email" class="font-label-md text-on-surface-variant">Email Address</label>
        <input type="email" id="email" required class="w-full px-4 py-3 bg-surface-container-lowest border border-outline-variant rounded-xl focus:border-secondary focus:ring-2 focus:ring-secondary/20 transition-all font-body-md outline-none" placeholder="you@example.com"/>
        <p id="email-error" class="hidden text-error text-[11px] mt-0.5 font-medium"></p>
      </div>

      <div class="flex flex-col gap-1.5">
        <label for="password" class="font-label-md text-on-surface-variant">Password</label>
        <input type="password" id="password" required class="w-full px-4 py-3 bg-surface-container-lowest border border-outline-variant rounded-xl focus:border-secondary focus:ring-2 focus:ring-secondary/20 transition-all font-body-md outline-none" placeholder="••••••••"/>
        <p id="password-error" class="hidden text-error text-[11px] mt-0.5 font-medium"></p>
      </div>

      <button type="submit" id="submit-btn" class="w-full py-3.5 bg-secondary text-on-secondary rounded-xl font-bold hover:brightness-110 active:scale-98 transition-all flex items-center justify-center gap-2 shadow-md">
        <span id="btn-text">Sign In</span>
        <svg id="btn-spinner" class="hidden animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
      </button>
    </form>

    <div class="mt-8 text-center border-t border-outline-variant pt-6">
      <p class="font-body-md text-on-surface-variant text-xs">Default credentials: <span class="font-bold">smartfridge@gmail.com</span> / <span class="font-bold">SmartFridge123</span></p>
    </div>
  </div>

  <script type="module">
    import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { auth } from "./firebase-init.js";

    const form = document.getElementById('login-form');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const errorBanner = document.getElementById('error-banner');
    const errorMessage = document.getElementById('error-message');
    const submitBtn = document.getElementById('submit-btn');
    const btnText = document.getElementById('btn-text');
    const btnSpinner = document.getElementById('btn-spinner');
    
    const emailError = document.getElementById('email-error');
    const passwordError = document.getElementById('password-error');

    // Email validation on blur
    emailInput.addEventListener('blur', () => {
      const email = emailInput.value;
      if (!email) {
        showFieldError(emailError, 'Email is required');
      } else if (!validateEmail(email)) {
        showFieldError(emailError, 'Please enter a valid email address');
      } else {
        hideFieldError(emailError);
      }
    });

    passwordInput.addEventListener('blur', () => {
      if (!passwordInput.value) {
        showFieldError(passwordError, 'Password is required');
      } else {
        hideFieldError(passwordError);
      }
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = emailInput.value;
      const password = passwordInput.value;

      let hasError = false;
      if (!validateEmail(email)) {
        showFieldError(emailError, 'Please enter a valid email');
        hasError = true;
      }
      if (!password) {
        showFieldError(passwordError, 'Password is required');
        hasError = true;
      }

      if (hasError) return;

      // Loading state
      setLoading(true);
      errorBanner.classList.add('hidden');

      try {
        await signInWithEmailAndPassword(auth, email, password);
        // auth-guard.js will handle redirecting upon state change
      } catch (err) {
        setLoading(false);
        console.error(err);
        let msg = 'Authentication failed. Please check your credentials.';
        if (err.code === 'auth/invalid-credential' || err.code === 'auth/wrong-password' || err.code === 'auth/user-not-found') {
          msg = 'Incorrect email or password.';
        } else if (err.code === 'auth/invalid-email') {
          msg = 'Invalid email address format.';
        } else if (err.code === 'auth/user-disabled') {
          msg = 'This user account has been disabled.';
        }
        errorMessage.innerText = msg;
        errorBanner.classList.remove('hidden');
      }
    });

    function validateEmail(email) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }

    function showFieldError(element, msg) {
      element.innerText = msg;
      element.classList.remove('hidden');
    }

    function hideFieldError(element) {
      element.classList.add('hidden');
    }

    function setLoading(isLoading) {
      if (isLoading) {
        submitBtn.disabled = true;
        btnText.classList.add('hidden');
        btnSpinner.classList.remove('hidden');
      } else {
        submitBtn.disabled = false;
        btnText.classList.remove('hidden');
        btnSpinner.classList.add('hidden');
      }
    }
  </script>
</body>
</html>
